<!DOCTYPE html>
<html>
<body>

<h2>Register Test</h2>

<button onclick="register()">Register</button>

<script>
function register() {
    console.log("button clicked");

    fetch("http://127.0.0.1:6090/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: "test2",
            password: "1234"
        })
    })
    .then(res => res.json())
    .then(data => console.log(data))
    .catch(err => console.log("error:", err));
}
</script>

</body>
</html>
